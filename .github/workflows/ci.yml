name: PentaScope CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend lint & tests ───────────────────────────────────────────────────
  backend:
    name: Backend — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (nmap)
        run: sudo apt-get update && sudo apt-get install -y nmap

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; warn on style
          flake8 backend/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          flake8 backend/ \
            --count \
            --max-line-length=110 \
            --exit-zero \
            --statistics

      - name: Run backend unit tests
        working-directory: backend
        env:
          FLASK_DEBUG: "false"
          FLASK_TESTING: "true"
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No test suite found — skipping"

  # ── Frontend lint & build ──────────────────────────────────────────────────
  frontend:
    name: Frontend — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx --max-warnings 20 || true

      - name: Build production bundle
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:5000
          CI: false        # Allow warnings without failing the build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20'
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ── Docker build smoke test ────────────────────────────────────────────────
  docker:
    name: Docker Compose — build smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build --no-cache

      - name: Verify backend image starts
        run: |
          docker compose up -d backend
          sleep 15
          docker compose exec -T backend \
            python -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/')" \
            && echo "Backend OK" \
            || (docker compose logs backend && exit 1)

      - name: Tear down
        if: always()
        run: docker compose down -v
